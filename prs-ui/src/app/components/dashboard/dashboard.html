<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Consolidated Personnel Registration</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" routerLink="/dashboard">Search</a></li>
        <li class="nav-item"><a class="nav-link" routerLink="/mft-management">MFT Feed</a></li>
      </ul>
      <button class="btn btn-sm btn-outline-light" (click)="onLogout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container-fluid mt-4 px-5">
  <h4 class="mb-4 text-muted">Profile Search</h4>

  <div class="card shadow-sm border-0 mb-5">
    <div class="card-body p-4">
      <div class="row mb-4">
        <div class="col-md-6">
          <label class="enterprise-label">Last Name</label>
          <input type="text" class="form-control enterprise-input" [(ngModel)]="searchLastName">
        </div>
        <div class="col-md-6">
          <label class="enterprise-label">First Name</label>
          <input type="text" class="form-control enterprise-input" [(ngModel)]="searchFirstName">
        </div>
      </div>

      <div class="row mb-4">
        <div class="col-md-6">
          <label class="enterprise-label">Email Address</label>
          <input type="text" class="form-control enterprise-input" [(ngModel)]="searchEmail">
        </div>
        <div class="col-md-6">
          <label class="enterprise-label">Status</label>
          <select class="form-select enterprise-input" [(ngModel)]="searchStatus">
            <option value="All">All</option>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-3 mt-4">
        <button class="btn btn-outline-secondary px-4" (click)="resetSearch()">Reset</button>
        <button class="btn btn-danger px-4" (click)="performSearch()">Search</button>
      </div>
    </div>
  </div> <div *ngIf="hasSearched">
    <h6 class="text-muted mb-3">Displayed Columns</h6>
    <div class="card shadow-sm border-0">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="table-light text-muted" style="font-size: 0.85rem;">
            <tr>
              <th>Name</th>
              <th>Employee ID</th>
              <th>Email</th>
              <th>Status</th>
              <th class="text-end">Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let profile of searchResults">
              <td class="align-middle fw-bold">{{ profile.name }}</td>
              <td class="align-middle">{{ profile.employee_ID }}</td>
              <td class="align-middle">{{ profile.email_ID }}</td>
              <td class="align-middle">
                <span class="badge" [ngClass]="profile.record_Status === 'Active' ? 'bg-success' : 'bg-secondary'">
                  {{ profile.record_Status }}
                </span>
              </td>
              <td class="text-end">
                <button class="btn btn-sm btn-outline-danger" [routerLink]="['/profile', profile.guid]">Access Profile</button>
              </td>
            </tr>
            
            <tr *ngIf="searchResults.length === 0">
              <td colspan="5" class="text-center text-muted py-4">No records found matching your search.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
