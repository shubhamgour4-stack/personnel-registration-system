<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="card shadow-sm mt-5">
        <div class="card-body p-4">
          
          <h3 class="text-center mb-4">Personnel Registration</h3>
          
         <form (ngSubmit)="onLogin()">
            
            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input type="email" class="form-control" id="email" name="email" [(ngModel)]="email" placeholder="name@example.com" required>
            </div>
            
            <div class="mb-4">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" name="password" [(ngModel)]="password" placeholder="Enter password" required>
            </div>
            
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary">Login</button>
            </div>
          </form>

          <div class="text-center mt-3">
            <small>Don't have an account? <a routerLink="/register">Register here</a></small>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
