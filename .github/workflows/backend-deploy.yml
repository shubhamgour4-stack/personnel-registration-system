name: Continuous Integration & Deployment Pipeline

on:
  push:
    branches: [ develop ]

jobs:
  build-and-deploy-services:
    runs-on: ubuntu-latest

    steps:
    - name: Clone Code Repository
      uses: actions/checkout@v4

    - name: Initialize .NET 8 SDK Platform
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Project Dependencies
      run: dotnet restore Personnel-Registration-System/src/Presentation/PRS.API/PRS.API.csproj

    - name: Compile Backend Binaries (Release Mode)
      run: dotnet build Personnel-Registration-System/src/Presentation/PRS.API/PRS.API.csproj --configuration Release --no-restore

    - name: Publish Production Payload Packages
      run: dotnet publish Personnel-Registration-System/src/Presentation/PRS.API/PRS.API.csproj -c Release -o ${{env.DOTNET_ROOT}}/compiled_api_package

    - name: Deploy Payload Package to Azure App Service
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'api-prs-enterprise'
        publish-profile: ${{secrets.AZURE_WEBAPP_PUBLISH_PROFILE}}
        package: ${{env.DOTNET_ROOT}}/compiled_api_package