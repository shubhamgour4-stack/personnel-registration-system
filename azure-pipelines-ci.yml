trigger:
  batch: true
  branches:
    include:
      - develop
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  dotNetVersion: '8.0.x'
  nodeVersion: '20.x'

stages:
- stage: Build_Backend_Stage
  displayName: 'Compile & Package .NET Core API'
  jobs:
  - job: Compile_NET_API
    displayName: 'Dotnet Build Engine Task'
    steps:
    - task: UseDotNet@2
      displayName: 'Provision .NET 8 SDK Platform'
      inputs:
        packageType: 'sdk'
        version: '$(dotNetVersion)'

    # Runs directly from the root where the .sln file sits
    - script: dotnet restore Personnel-Registration-System.sln
      displayName: 'Restore NuGet Packages Cache'

    - script: dotnet build Personnel-Registration-System.sln --configuration $(buildConfiguration) --no-restore
      displayName: 'Compile Code Binaries'

    - task: DotNetCoreCLI@2
      displayName: 'Publish Production Payload Zip'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'src/Presentation/PRS.API/PRS.API.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/backend'
        zipAfterPublish: true

    - task: PublishBuildArtifacts@1
      displayName: 'Vault Backend Artifact Archive'
      inputs:
        pathtoPublish: '$(Build.ArtifactStagingDirectory)/backend'
        ArtifactName: 'backend-drop'
        publishLocation: 'Container'

- stage: Build_Frontend_Stage
  displayName: 'Compile & Package Angular Client'
  jobs:
  - job: Compile_Angular
    displayName: 'Node Engine Compilation Task'
    steps:
    - task: NodeTool@0
      displayName: 'Provision Node.js Environment'
      inputs:
        versionSpec: '$(nodeVersion)'

    # Navigates straight into the root-level prs-ui folder
    - script: |
        cd prs-ui
        npm ci
      displayName: 'Restore Node Packages Modules Cache'

    - script: |
        cd prs-ui
        npm run build -- --configuration=production
      displayName: 'Compile Angular Client Production Distribution Package'

    - task: PublishBuildArtifacts@1
      displayName: 'Vault Frontend Artifact Archive'
      inputs:
        pathtoPublish: 'prs-ui/dist/prs-ui/browser'
        ArtifactName: 'frontend-drop'
        publishLocation: 'Container'
